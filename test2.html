<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Prueba con carro</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; }
  </style>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: ./targets/morral.mind;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="modeloMorral" src="./assets/modelo.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity position="0 0 0.15">
        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
          <a-gltf-model
            src="#modeloMorral"
            scale="0.001 0.001 0.001"
            position="0.02 -0.06 0.03"
          ></a-gltf-model>
        </a-entity>
      </a-entity>
    </a-entity>
  </a-scene>
</body>
</html>
